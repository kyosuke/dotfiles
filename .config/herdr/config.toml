onboarding = false
# herdr の設定。デフォルトと異なる項目だけを書く。
# 全オプションの一覧は `herdr --default-config` で確認できる。

[terminal]
# fish を使う。ログインシェルは zsh のため、default_shell が空だと
# $SHELL 経由で zsh が起動してしまうので明示する。
default_shell = "fish"

[theme]
name = "solarized"
auto_switch = false

[ui]
agent_panel_sort = "spaces"

[ui.sidebar.agents]
row_gap = 1

[ui.sidebar.spaces]
row_gap = 1

# jj (Jujutsu) ワークスペース連携。プラグイン本体は herdr のランタイム領域に
# ビルド・保存されるためコミット対象外。新環境では次のコマンドで入れ直す。
#   herdr plugin install NathanFlurry/herdr-plugin-jj-workspace
# ここで管理するのはキーバインドのみ（stock herdr では未割り当てのキー）。
[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new-tab"
description = "new jj workspace (in tab)"

[[keys.command]]
key = "prefix+shift+a"
type = "plugin_action"
command = "nathanflurry.jj-workspace.new"
description = "new jj workspace"

[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "nathanflurry.jj-workspace.remove"
description = "remove jj workspace"
